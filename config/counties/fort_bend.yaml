county_id: fort_bend
appraisal_district: Fort Bend Central Appraisal District
timezone: America/Chicago
datasets:
  - property_roll
  - tax_rates
  - deeds
parser_module: app.county_adapters.fort_bend.parse
notes: Config-driven Fort Bend metadata and field mapping authority for the Stage 5 fixture-backed property_roll workflow.
capabilities:
  parcel_level_homestead:
    label: Parcel-level homestead signal
    status: supported
    source_datasets:
      - property_roll
    notes: Homestead exemptions are available at parcel level in the current Fort Bend property-roll pipeline.
  parcel_level_over65:
    label: Parcel-level over65 signal
    status: supported
    source_datasets:
      - property_roll
    notes: Fort Bend parcel-level over65 support is present through the current exemption normalization flow.
  parcel_level_freeze_signal:
    label: Parcel-level freeze signal
    status: limited
    source_datasets:
      - property_roll
    notes: Freeze-related indicators exist in exemption rollups, but qualifying-exemption consistency still requires operator review.
  instant_quote_exemption_normalization_confidence:
    label: Instant quote exemption normalization confidence
    status: limited
    source_datasets:
      - property_roll
    notes: Fort Bend exemption normalization is usable for summary-stage support, but missing exemption amounts are still common enough to keep confidence limited.
  instant_quote_over65_reliability:
    label: Instant quote over65 reliability
    status: supported
    source_datasets:
      - property_roll
    notes: Fort Bend source mappings support over65, but Stage 3 materialization must still keep the current-year observed signal explicit.
  instant_quote_disabled_reliability:
    label: Instant quote disabled reliability
    status: supported
    source_datasets:
      - property_roll
    notes: Fort Bend disabled-person mappings and current-year signal are strong enough for supported internal use.
  instant_quote_disabled_veteran_reliability:
    label: Instant quote disabled veteran reliability
    status: supported
    source_datasets:
      - property_roll
    notes: Fort Bend disabled-veteran mappings and current-year signal are strong enough for supported internal use.
  instant_quote_freeze_reliability:
    label: Instant quote freeze reliability
    status: limited
    source_datasets:
      - property_roll
    notes: Fort Bend freeze-related indicators exist, but qualifying-exemption consistency still requires operator review.
  instant_quote_school_ceiling_amount_available:
    label: Instant quote school ceiling amount availability
    status: unsupported
    source_datasets:
      - property_roll
      - tax_rates
    notes: Exact school ceiling amount or binding truth is not materialized for Fort Bend and must not be implied.
  instant_quote_local_option_policy_available:
    label: Instant quote local-option policy availability
    status: unsupported
    source_datasets:
      - tax_rates
    notes: Fort Bend local-option percentage policy truth is not materialized in the current instant-quote stack.
  instant_quote_profile_support_level:
    label: Instant quote profile support level
    status: summary_only
    source_datasets:
      - property_roll
      - tax_rates
    notes: Fort Bend Stage 3 supports county-level summary capability only; parcel-level tax profile materialization is still deferred.
  tax_rate_unit_coverage:
    label: Tax-rate unit coverage
    status: supported
    source_datasets:
      - tax_rates
    notes: Fort Bend tax-rate ingestion supports current unit/rate coverage and downstream assignment hints.
  historical_backfill_execution:
    label: Historical backfill execution
    status: manual_only
    source_datasets:
      - property_roll
      - tax_rates
      - deeds
    notes: Prior-year Fort Bend execution still depends on prep-validated manifests and county-provided files rather than fully live acquisition.
  search_refresh_runtime:
    label: Search refresh runtime
    status: standard
    source_datasets:
      - property_roll
    notes: Fort Bend search refresh is still a maintenance step, but it has not shown the same heavy runtime profile as Harris.
metadata:
  cad_short_name: FBCAD
  source_mode: config_driven
  stage_status: stage5_fixture_backed
