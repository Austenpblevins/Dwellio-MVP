county_id: fort_bend
# Stage 5 dataset registry for Fort Bend County. Source-specific acquisition details stay
# here so the shared ingestion framework remains county-agnostic.
datasets:
  property_roll:
    source_system_code: FBCAD_EXPORT
    source_name: Fort Bend CAD Property Roll
    source_type: county_appraisal_roll
    description: Fixture-backed Fort Bend property roll feed used to prove multi-county ingestion on the shared framework.
    source_url: https://www.fbcad.org
    file_format: csv
    staging_table: stg_county_property_raw
    access_method: fixture_csv
    cadence: annual
    reliability_tier: development_fixture
    auth_required: false
    manual_fallback_supported: true
    legal_notes: Fixture data is development-safe and excludes restricted MLS or listing content.
    entity_coverage:
      - parcel
      - assessment
      - exemption
    supported_years:
      - 2022
      - 2023
      - 2024
      - 2025
      - 2026
    dependencies: []
    ingestion_ready: true
    null_handling:
      required_source_fields:
        - account_id
        - site_address
        - site_city
        - site_zip
      default_values:
        property_type_code: sfr
        primary_use_code: residential
        building_label: Main
        land_type_code: site
    transformation_notes:
      - Fort Bend fixture ingestion is CSV-backed rather than JSON-backed.
      - Separate exemption amount columns are converted into a canonical exemptions list by the Fort Bend parser.
      - Source field names remain Fort Bend-specific here so canonical normalization stays config-driven.
    metadata:
      fixture_backed: true
      fixture_years:
        - 2026
      manual_backfill_years:
        - 2022
        - 2023
        - 2024
        - 2025
      historical_backfill_note: Use real Fort Bend county exports or manual county downloads for prior tax years until live or fixture-backed historical acquisition is added.
      fixture_path: app/county_adapters/fort_bend/fixtures/property_roll_2026.csv
      delimiter: ','
      source_family: appraisal_roll
      parser_name: property_roll_csv
      validation_profile: fort_bend_property_roll_v1
  tax_rates:
    source_system_code: FBCAD_TAX_RATES
    source_name: Fort Bend CAD Tax Rate Extract
    source_type: county_tax_rates
    description: Fixture-backed Fort Bend tax unit and rate extract used to prove Stage 6 tax-rate ingestion on the shared multi-county framework.
    source_url: https://www.fbcad.org
    file_format: csv
    staging_table: stg_county_tax_rates_raw
    access_method: fixture_csv
    cadence: annual
    reliability_tier: development_fixture
    auth_required: false
    manual_fallback_supported: true
    legal_notes: Fixture data is development-safe and contains only public-safe tax unit and rate information.
    entity_coverage:
      - tax_unit
      - tax_rate
      - parcel_tax_assignment_hint
    supported_years:
      - 2022
      - 2023
      - 2024
      - 2025
      - 2026
    dependencies:
      - property_roll
    ingestion_ready: true
    null_handling:
      required_source_fields:
        - unit_type_code
        - unit_code
        - unit_name
        - rate_component
        - rate_value
    transformation_notes:
      - Fort Bend tax-rate fixtures stay CSV-backed to prove the shared ingestion framework can dispatch datasets without assuming a single county transport or schema shape.
      - Assignment hints are normalized into canonical list fields during parsing so downstream assignment logic stays county-agnostic.
    metadata:
      fixture_backed: true
      fixture_years:
        - 2026
      manual_backfill_years:
        - 2022
        - 2023
        - 2024
        - 2025
      historical_backfill_note: Use real Fort Bend tax-rate exports for prior tax years; fixture-backed acquisition currently exists only for 2026.
      fixture_path: app/county_adapters/fort_bend/fixtures/tax_rates_2026.csv
      delimiter: ','
      source_family: tax_rates
      parser_name: tax_rates_csv
      validation_profile: fort_bend_tax_rates_v1
  deeds:
    source_system_code: DEED_FEED
    source_name: Fort Bend Deed Feed
    source_type: county_deed_feed
    description: Fixture-backed Fort Bend deed extract used to prove Stage 9 deed ingestion and ownership reconciliation.
    source_url: https://www.fbcad.org
    file_format: csv
    staging_table: stg_sales_raw
    access_method: fixture_csv
    cadence: ad_hoc
    reliability_tier: development_fixture
    auth_required: false
    manual_fallback_supported: true
    legal_notes: Fixture data is development-safe and contains only deed-style ownership evidence needed for reconciliation testing.
    entity_coverage:
      - deed
      - ownership
    supported_years:
      - 2022
      - 2023
      - 2024
      - 2025
      - 2026
    dependencies:
      - property_roll
    ingestion_ready: true
    null_handling:
      required_source_fields:
        - instrument_number
        - recording_date
    transformation_notes:
      - Fort Bend deed fixtures stay CSV-backed to keep county parsing isolated while still flowing through the shared staging table family.
      - Grantor and grantee name columns are converted into canonical party arrays before normalization and publish.
    metadata:
      fixture_backed: true
      fixture_years:
        - 2026
      manual_backfill_years:
        - 2022
        - 2023
        - 2024
        - 2025
      historical_backfill_note: Use real Fort Bend deed exports for prior tax years; fixture-backed acquisition currently exists only for 2026.
      fixture_path: app/county_adapters/fort_bend/fixtures/deeds_2026.csv
      delimiter: ','
      source_family: deeds
      parser_name: deeds_csv
      validation_profile: fort_bend_deeds_v1
