        property_type_code: sfr
    transformation_notes:
      - Fort Bend field names and parser details are intentionally deferred until the county-specific implementation stage.
      - This file exists now so the framework can consume the same config shape without redesign.
    metadata:
      fixture_backed: false
      scaffold_only: true
