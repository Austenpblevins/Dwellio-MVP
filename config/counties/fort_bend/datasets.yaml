    manual_fallback_supported: true
    legal_notes: Live Fort Bend acquisition and parser specifics are intentionally deferred.
    entity_coverage:
      - parcel
      - assessment
      - exemption
    supported_years:
      - 2026
    dependencies: []
    ingestion_ready: false
